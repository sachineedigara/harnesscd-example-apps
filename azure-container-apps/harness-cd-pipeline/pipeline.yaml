pipeline:
  name: Azure Container Apps Deployment
  identifier: Azure_Container_Apps_Deployment
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Deploy Container App
        identifier: deploy_container_app
        description: Deploy containerized application to Azure Container Apps
        type: Deployment
        spec:
          deploymentType: AzureContainerApps
          service:
            serviceRef: <+input>
            serviceInputs: <+input>
          environment:
            environmentRef: <+input>
            deployToAll: false
            environmentInputs: <+input>
            infrastructureDefinitions: <+input>
          execution:
            steps:
              - stepGroup:
                  name: Azure Container Apps Deployment
                  identifier: azure_container_apps_deployment
                  steps:
                    - step:
                        type: DownloadManifests
                        name: Download Manifests
                        identifier: download_manifests
                        spec: {}
                        timeout: 10m
                    - step:
                        type: AzureContainerAppsPrepareRollbackData
                        name: Prepare Rollback Data
                        identifier: prepare_rollback_data
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/azure-container-apps-plugin:0.0.1-linux-amd64
                          imagePullPolicy: Always
                        timeout: 10m
                    - step:
                        type: AzureContainerAppsDeploy
                        name: Deploy Container App
                        identifier: deploy_container_app_step
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/azure-container-apps-plugin:0.0.1-linux-amd64
                          imagePullPolicy: Always
                          skipTrafficShift: false
                        timeout: 10m
                    - step:
                        type: AzureContainerAppsTrafficShift
                        name: Shift Traffic
                        identifier: shift_traffic
                        spec:
                          revisionTrafficDetails:
                            - revisionName: latest
                              trafficValue: 100
                              tag: latest
                          connectorRef: account.harnessImage
                          image: harness/azure-container-apps-plugin:0.0.1-linux-amd64
                          imagePullPolicy: Always
                        timeout: 10m
                  sharedPaths:
                    - /var/run
                    - /var/lib/docker
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: <+input>
                      namespace: <+input>
            rollbackSteps:
              - stepGroup:
                  name: Azure Container Apps Rollback
                  identifier: azure_container_apps_rollback
                  steps:
                    - step:
                        type: AzureContainerAppsRollback
                        name: Rollback Container App
                        identifier: rollback_container_app
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/azure-container-apps-plugin:0.0.1-linux-amd64
                          imagePullPolicy: Always
                        timeout: 10m
                  sharedPaths:
                    - /var/run
                    - /var/lib/docker
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: <+input>
                      namespace: <+input>
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
