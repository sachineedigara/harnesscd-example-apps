# Azure Container Apps Manifest
# This file defines the configuration for an Azure Container App
# Upload this file to Harness File Store at path: /azure-container-apps/manifest

name: my-container-app
properties:
  configuration:
    # Revision mode: Single (one active revision) or Multiple (traffic splitting)
    activeRevisionsMode: Single

    # Ingress configuration for external access
    ingress:
      external: true           # Set to false for internal-only apps
      targetPort: 80           # Port your container listens on
      traffic:
        - latestRevision: true
          weight: 100

  template:
    # Container configuration
    containers:
      - name: my-app
        image: <+artifact.image>  # Harness expression - replaced at runtime
        resources:
          cpu: 0.25              # vCPU cores (0.25, 0.5, 0.75, 1.0, etc.)
          memory: 0.5Gi          # Memory allocation

    # Optional: Scaling configuration
    scale:
      minReplicas: 1             # Minimum number of replicas
      maxReplicas: 10            # Maximum number of replicas
      rules:
        - name: http-rule
          http:
            metadata:
              concurrentRequests: "100"
